<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祁煜小屋</title>
    
    <!-- 替换为生产环境 CDN（无警告） -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <!-- 自定义样式（单独写 style 标签，不再用 tailwind.config） -->
    <style>
      /* 全局样式重置 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', sans-serif;
        color: #333;
        line-height: 1.6;
      }
      
      /* 自定义主题色（替代 Tailwind 配置） */
      :root {
        --primary: #FF3366;
        --secondary: #6A0DAD;
        --accent: #FFB6C9;
        --dark: #1A1A2E;
        --light: #F8F9FA;
      }
      
      /* 自定义工具类 */
      .backdrop-blur {
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .animate-bounce {
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      /* 覆盖 Tailwind 基础样式 */
      .bg-primary { background-color: var(--primary); }
      .text-primary { color: var(--primary); }
      .border-primary { border-color: var(--primary); }
      .hover\:bg-primary\/90:hover { background-color: rgba(255, 51, 102, 0.9); }
      .hover\:text-primary:hover { color: var(--primary); }
      
      .bg-secondary { background-color: var(--secondary); }
      .text-secondary { color: var(--secondary); }
      .bg-secondary\/10 { background-color: rgba(106, 13, 173, 0.1); }
      
      .bg-accent { background-color: var(--accent); }
      .text-accent { color: var(--accent); }
      .border-accent { border-color: var(--accent); }
      .hover\:bg-accent\/90:hover { background-color: rgba(255, 215, 0, 0.9); }
      
      .bg-dark { background-color: var(--dark); }
      .text-dark { color: var(--dark); }
      .bg-dark\/10 { background-color: rgba(26, 26, 46, 0.1); }
      .bg-dark\/70 { background-color: rgba(26, 26, 46, 0.7); }
      .bg-dark\/80 { background-color: rgba(26, 26, 46, 0.8); }
      .bg-dark\/90 { background-color: rgba(26, 26, 46, 0.9); }
      .hover\:bg-dark\/90:hover { background-color: rgba(26, 26, 46, 0.9); }
      .hover\:bg-dark\/20:hover { background-color: rgba(26, 26, 46, 0.2); }
      
      .bg-light { background-color: var(--light); }
      .text-light { color: var(--light); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
